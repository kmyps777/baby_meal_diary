<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f9a86b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="이유식 플래너" />
  <title>이유식 플래너</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ───── LOADING ───── -->
  <div id="login-screen" class="screen active">
    <div class="login-hero">
      <div class="hero-blob"></div>
      <div class="login-box">
        <div class="app-logo">🥣</div>
        <h1 class="app-title">이유식 플래너</h1>
        <p class="app-subtitle">우리 아이의 첫 식사를 기록해요</p>
        <div class="loading-spinner"></div>
        <p class="loading-text">불러오는 중...</p>
      </div>
    </div>
  </div>

  <!-- ───── APP ───── -->
  <div id="app-screen" class="screen">
    <header class="app-header">
      <div class="header-left">
        <span class="header-logo">🥣</span>
        <span class="header-title">이유식 플래너</span>
      </div>
      <div class="header-right">
        <img id="user-avatar" class="user-avatar" src="" alt="프로필" style="display:none" />
        <span id="user-email-badge" class="user-email-badge" style="display:none"></span>
        <button id="btn-backup" class="btn-backup-icon" title="데이터 백업">
          ☁️
        </button>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="planner">
        <span class="tab-icon">📅</span><span class="tab-label">재료 플래너</span>
      </button>
      <button class="tab-btn" data-tab="meal">
        <span class="tab-icon">🍽️</span><span class="tab-label">식단표</span>
      </button>
      <button class="tab-btn" data-tab="cube">
        <span class="tab-icon">🧊</span><span class="tab-label">큐브 관리</span>
      </button>
    </nav>

    <main class="tab-content">

      <!-- TAB 1: 재료 플래너 -->
      <section id="tab-planner" class="tab-pane active">
        <div class="section-header">
          <div class="cal-nav">
            <button id="planner-prev" class="btn-nav">‹</button>
            <h2 id="planner-month-title" class="month-title"></h2>
            <button id="planner-next" class="btn-nav">›</button>
          </div>
          <button id="btn-add-plan" class="btn-primary small">+ 계획 추가</button>
        </div>
        <div id="planner-calendar" class="plan-calendar"></div>
      </section>

      <!-- TAB 2: 식단표 -->
      <section id="tab-meal" class="tab-pane">
        <div class="section-header">
          <div class="cal-nav">
            <button id="meal-prev" class="btn-nav">‹</button>
            <h2 id="meal-month-title" class="month-title"></h2>
            <button id="meal-next" class="btn-nav">›</button>
          </div>
          <button id="btn-export-excel" class="btn-outline small">📥 엑셀 내보내기</button>
        </div>
        <div id="meal-calendar" class="calendar-grid"></div>
        <div id="meal-day-panel" class="meal-day-panel hidden">
          <div class="meal-day-header">
            <span id="meal-selected-date" class="meal-date-label"></span>
            <button id="btn-close-meal-panel" class="btn-icon">✕</button>
          </div>
          <div id="meal-slots" class="meal-slots"></div>
          <button id="btn-add-meal-slot" class="btn-outline full-width">+ 끼니/간식 추가</button>
        </div>
      </section>

      <!-- TAB 3: 큐브 관리 -->
      <section id="tab-cube" class="tab-pane">
        <div class="cube-tab-bar">
          <button class="cube-tab-btn active" data-ctab="active">사용중 큐브</button>
          <button class="cube-tab-btn" data-ctab="done">소진된 큐브</button>
        </div>
        <div class="cube-header-row">
          <button id="btn-add-cube" class="btn-primary small">+ 큐브 등록</button>
        </div>
        <div class="cube-controls">
          <div class="cube-control-group">
            <span class="cube-control-label">정렬</span>
            <div class="cube-control-btns">
              <button class="cube-sort-btn active" data-sort="expire">유통기한순</button>
              <button class="cube-sort-btn" data-sort="category">카테고리순</button>
            </div>
          </div>
          <div class="cube-control-group">
            <span class="cube-control-label">종류</span>
            <div class="cube-control-btns">
              <button class="cube-cat-btn active" data-cat="all">전체</button>
              <button class="cube-cat-btn" data-cat="base">🍚</button>
              <button class="cube-cat-btn" data-cat="protein">🥩</button>
              <button class="cube-cat-btn" data-cat="other">🥦</button>
              <button class="cube-cat-btn" data-cat="snack">🥞</button>
            </div>
          </div>
        </div>
        <div id="cube-list-active" class="cube-list"></div>
        <div id="cube-done-header" class="cube-done-header hidden">
          <button id="btn-delete-all-done" class="btn-danger small">🗑️ 소진된 큐브 전체 삭제</button>
        </div>
        <div id="cube-list-done" class="cube-list hidden"></div>
      </section>

    </main>
  </div>

  <!-- ════ MODALS ════ -->

  <!-- Plan List Modal (날짜에 계획 여러 개일 때) -->
  <div id="modal-plan-list" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-plan-list-title">계획 목록</h3>
        <button class="btn-icon modal-close" data-modal="modal-plan-list">✕</button>
      </div>
      <div class="modal-body" id="modal-plan-list-body"></div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="openPlanModal(null, window._planListDate); closeModal('modal-plan-list')">+ 새 계획 추가</button>
      </div>
    </div>
  </div>

  <!-- Plan Modal -->
  <div id="modal-plan" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-plan-title">새 재료 계획</h3>
        <button class="btn-icon modal-close" data-modal="modal-plan">✕</button>
      </div>
      <div class="modal-body">
        <label class="form-label">재료 이름</label>
        <input id="plan-ingredient" class="form-input" type="text" placeholder="예: 당근" />
        <label class="form-label">날짜</label>
        <input id="plan-date" class="form-input date-input" type="date" />
        <label class="form-label">메모 (선택)</label>
        <textarea id="plan-memo" class="form-input" rows="2" placeholder="참고사항을 입력하세요"></textarea>
      </div>
      <div class="modal-footer">
        <button id="btn-plan-delete" class="btn-danger hidden">삭제</button>
        <button id="btn-plan-save" class="btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- Meal Slot Modal -->
  <div id="modal-meal-slot" class="modal-overlay hidden">
    <div class="modal-box large">
      <div class="modal-header">
        <h3 id="modal-slot-title">끼니 작성</h3>
        <button class="btn-icon modal-close" data-modal="modal-meal-slot">✕</button>
      </div>
      <div class="modal-body">
        <label class="form-label">시간 이름</label>
        <div class="time-label-wrap">
          <input id="slot-time-label" class="form-input" type="text" placeholder="예: 아침 이유식, 오전 간식" autocomplete="off" />
          <div id="time-label-dropdown" class="time-dropdown hidden"></div>
        </div>
        <div class="slot-type-row">
          <span class="form-label" style="margin:0">종류</span>
          <div class="toggle-group" id="slot-type-toggle">
            <button class="toggle-btn active" data-type="meal">이유식</button>
            <button class="toggle-btn" data-type="snack">간식</button>
          </div>
        </div>
        <div id="slot-meal-section">
          <div class="category-section">
            <div class="category-label">🍚 베이스죽</div>
            <div id="slot-base-cubes" class="cube-picker-row"></div>
            <button class="btn-add-cube-slot" data-cat="base">+ 큐브 추가</button>
          </div>
          <div class="category-section">
            <div class="category-label">🥩 단백질</div>
            <div id="slot-protein-cubes" class="cube-picker-row"></div>
            <button class="btn-add-cube-slot" data-cat="protein">+ 큐브 추가</button>
          </div>
          <div class="category-section">
            <div class="category-label">🥦 기타</div>
            <div id="slot-other-cubes" class="cube-picker-row"></div>
            <button class="btn-add-cube-slot" data-cat="other">+ 큐브 추가</button>
          </div>
          <div class="total-g-row">
            총 이유식: <strong id="slot-total-g">0g</strong>
          </div>
        </div>
        <div id="slot-snack-cube-section" class="hidden">
          <div class="category-section">
            <div class="category-label">🥞 간식</div>
            <div id="slot-snack-cubes" class="cube-picker-row"></div>
            <button class="btn-add-cube-slot" data-cat="snack">+ 큐브 추가</button>
          </div>
          <div class="total-g-row">
            총 간식: <strong id="slot-total-g-snack">0g</strong>
          </div>
        </div>
        <div id="slot-snack-section">
          <label class="form-label">메모</label>
          <textarea id="slot-snack-memo" class="form-input" rows="3" placeholder="내용을 입력하세요"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-slot-delete" class="btn-danger hidden">삭제</button>
        <button id="btn-slot-save" class="btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- Cube Picker Modal -->
  <div id="modal-cube-picker" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-picker-title">큐브 선택</h3>
        <button class="btn-icon modal-close" data-modal="modal-cube-picker">✕</button>
      </div>
      <div class="modal-body">
        <input id="cube-picker-search" class="form-input" type="text" placeholder="큐브 이름 검색" />
        <div id="cube-picker-list" class="cube-picker-list"></div>
        <div id="cube-picker-selected-info" class="picker-selected-info hidden"></div>
      </div>
      <div class="modal-footer">
        <button id="btn-cube-picker-confirm" class="btn-primary">추가 (0개)</button>
      </div>
    </div>
  </div>

  <!-- Cube Add/Edit Modal -->
  <div id="modal-cube" class="modal-overlay hidden">
    <div class="modal-box large">
      <div class="modal-header">
        <h3 id="modal-cube-title">큐브 등록</h3>
        <button class="btn-icon modal-close" data-modal="modal-cube">✕</button>
      </div>
      <div class="modal-body">
        <label class="form-label">사용 재료</label>
        <div id="cube-ingredients-list" class="ingredient-tag-list"></div>
        <div class="ingredient-add-row">
          <input id="cube-ingredient-input" class="form-input" type="text" placeholder="재료 입력 후 추가" />
          <button id="btn-add-ingredient" class="btn-outline">추가</button>
        </div>
        <label class="form-label">큐브 이름 <span class="form-label-hint">(재료 추가 시 자동완성)</span></label>
        <input id="cube-name" class="form-input" type="text" placeholder="자동으로 입력되거나 직접 수정하세요" />
        <label class="form-label">분류</label>
        <select id="cube-category" class="form-input">
          <option value="base">🍚 베이스죽</option>
          <option value="protein">🥩 단백질</option>
          <option value="other">🥦 기타</option>
          <option value="snack">🥞 간식</option>
        </select>
        <div class="form-row-2">
          <div>
            <label class="form-label">큐브당 g수</label>
            <input id="cube-g" class="form-input" type="number" min="0" step="5" placeholder="0" />
          </div>
          <div>
            <label class="form-label">개수</label>
            <input id="cube-count" class="form-input" type="number" min="1" placeholder="0" />
          </div>
        </div>
        <label class="form-label">제조일</label>
        <input id="cube-made-date" class="form-input date-input" type="date" />
        <div style="width:50%">
          <label class="form-label">유통기한 (일)</label>
          <input id="cube-expire-days" class="form-input" type="number" min="1" placeholder="7" />
        </div>
      </div>
      <div id="cube-consume-row" class="cube-consume-row hidden">
        <button id="btn-consume-one" class="cube-consume-btn" onclick="consumeOne(editingCubeId)">－ 낱개 소진</button>
        <button id="btn-consume-all" class="cube-consume-btn all" onclick="consumeAll(editingCubeId)">전량 소진</button>
      </div>
      <div class="modal-footer">
        <button id="btn-cube-delete" class="btn-danger hidden">삭제</button>
        <button id="btn-cube-save" class="btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- 엑셀 기간 선택 모달 -->
  <div id="modal-export" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3>엑셀 내보내기</h3>
        <button class="btn-icon modal-close" data-modal="modal-export">✕</button>
      </div>
      <div class="modal-body">
        <label class="form-label">시작일</label>
        <input id="export-start" class="form-input date-input" type="date" />
        <label class="form-label">종료일</label>
        <input id="export-end" class="form-input date-input" type="date" />
        <div id="export-quick-btns" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;">
          <button class="export-quick-btn" data-range="this-month">이번 달</button>
          <button class="export-quick-btn" data-range="last-month">지난 달</button>
          <button class="export-quick-btn" data-range="last-7">최근 7일</button>
          <button class="export-quick-btn" data-range="last-30">최근 30일</button>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-export-confirm" class="btn-primary">📥 다운로드</button>
      </div>
    </div>
  </div>

  <!-- ☁️ 데이터 백업 모달 -->
  <div id="modal-backup" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3>☁️ 데이터 백업</h3>
        <button class="btn-icon modal-close" data-modal="modal-backup">✕</button>
      </div>
      <div class="modal-body" id="backup-modal-body">
        <!-- JS로 동적 렌더링 -->
      </div>
      <div class="modal-footer">
        <button id="btn-backup-save" class="btn-primary">이메일 연결하기</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
